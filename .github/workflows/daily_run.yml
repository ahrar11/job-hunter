name: Daily Job Hunter

on:
  schedule:
    # 7:00 AM EST = 12:00 UTC. Change hour to suit your preference.
    - cron: "0 12 * * *"
  workflow_dispatch:   # Manual trigger from the Actions tab

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push updated data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node.js docx package
        run: npm install -g docx

      - name: Run Job Hunter pipeline
        env:
          JSEARCH_API_KEY:    ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:  ${{ secrets.RESEND_FROM_EMAIL }}
        run: python main.py

      - name: Commit updated files
        run: |
          git config user.name  "Job Hunter Bot"
          git config user.email "bot@job-hunter.local"
          git add \
            data/raw_jobs.json \
            data/top_jobs.json \
            data/seen_jobs.json \
            data/feedback_history.json \
            data/learning_profile.json \
            data/run_log.txt \
            data/digest.html \
            docs/index.html \
            config/job_titles.json || true
          git diff --staged --quiet || \
            git commit -m "chore: daily run $(date -u +%Y-%m-%d)"
          git push
