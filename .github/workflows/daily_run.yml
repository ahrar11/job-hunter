name: Daily Job Hunter

on:
  schedule:
    - cron: "0 2 * * *"   # 9:00 PM EST = 02:00 UTC
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node.js docx package (local so require() finds it)
        run: |
          cd scripts
          npm init -y
          npm install docx
          cd ..

      - name: Run Job Hunter pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          JSEARCH_API_KEY:      ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID:        ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:       ${{ secrets.ADZUNA_APP_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:    ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL:      ${{ secrets.RESEND_TO_EMAIL }}
          GITHUB_REPO:          ${{ github.repository }}
          GITHUB_FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
        run: python main.py

      - name: Commit updated files including tailored resumes
        run: |
          git config user.name  "Job Hunter Bot"
          git config user.email "bot@job-hunter.local"
          git add \
            data/raw_jobs.json \
            data/top_jobs.json \
            data/seen_jobs.json \
            data/feedback_history.json \
            data/learning_profile.json \
            data/run_log.txt \
            data/digest.html \
            docs/index.html \
            config/job_titles.json \
            "resumes/" || true
          git diff --staged --quiet || \
            git commit -m "chore: daily run $(date -u +%Y-%m-%d)"
          git push
