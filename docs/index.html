<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Hunter Dashboard · Ahrar Karim</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand:      #2E5FA3;
    --brand-dark: #1A1A2E;
    --green:      #27ae60;
    --yellow:     #f39c12;
    --red:        #e74c3c;
    --bg:         #f0f2f5;
    --card:       #ffffff;
    --text:       #1a1a2e;
    --muted:      #6c757d;
    --border:     #e0e4ea;
    --radius:     10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
          background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Top bar ── */
  header { background: var(--brand-dark); color: #fff; padding: 20px 32px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 700; }
  header .meta { font-size: 12px; color: #9aaac8; margin-top: 4px; }
  .stat-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,.1); border-radius: 8px; padding: 8px 14px;
           text-align: center; min-width: 80px; }
  .pill .num  { font-size: 22px; font-weight: 700; }
  .pill .lbl  { font-size: 11px; color: #9aaac8; margin-top: 2px; }

  /* ── Apply Session Banner ── */
  #session-banner { display: none; background: linear-gradient(135deg, #1e4080, #2E5FA3);
      padding: 16px 32px; color: #fff; }
  #session-banner.active { display: block; }
  .session-inner { max-width: 900px; margin: 0 auto; display: flex;
      align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .session-info { flex: 1; }
  .session-info h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .session-info .session-detail { font-size: 13px; color: #b8c8e8; }
  .session-progress { width: 200px; }
  .progress-bar { background: rgba(255,255,255,.2); border-radius: 6px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width .3s; }
  .progress-text { font-size: 11px; color: #b8c8e8; margin-top: 4px; text-align: right; }
  .session-actions { display: flex; gap: 8px; }
  .btn-session { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: all .15s; }
  .btn-session-next { background: var(--green); color: #fff; }
  .btn-session-next:hover { background: #219a52; }
  .btn-session-skip { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
  .btn-session-skip:hover { background: rgba(255,255,255,.25); }
  .btn-session-end { background: var(--red); color: #fff; }
  .btn-session-end:hover { background: #c0392b; }

  /* ── Filters ── */
  .filters { background: var(--card); border-bottom: 1px solid var(--border);
              padding: 14px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filters input { flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid var(--border);
                    border-radius: 6px; font-size: 14px; outline: none; }
  .filters input:focus { border-color: var(--brand); }
  .filter-btn { padding: 7px 14px; border: 1px solid var(--border); background: #fff;
                 border-radius: 6px; font-size: 13px; cursor: pointer; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-start-session { padding: 7px 16px; border: none; background: var(--green); color: #fff;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-start-session:hover { background: #219a52; }
  select { padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; background: #fff; cursor: pointer; }

  /* ── Job grid ── */
  .grid { max-width: 900px; margin: 24px auto; padding: 0 20px; display: flex;
           flex-direction: column; gap: 16px; }
  .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }

  /* ── Job card ── */
  .card { background: var(--card); border-radius: var(--radius); padding: 20px 22px;
           border-left: 5px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06);
           transition: all .2s; position: relative; }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.10); }
  .card.connected-1  { border-left-color: var(--green); }
  .card.connected-2  { border-left-color: var(--yellow); }
  .card.status-applied { opacity: .55; }
  .card.status-skipped { display: none; }
  .card.session-active { border-left-color: var(--brand); box-shadow: 0 0 0 2px var(--brand), 0 4px 14px rgba(46,95,163,.25); }
  .card.session-done { opacity: .4; }

  /* Selection checkbox */
  .card-select { position: absolute; top: 12px; right: 12px; }
  .card-select input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-rank { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 6px; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--brand-dark); }
  .card-company { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .card-company strong { color: var(--text); }

  /* Score bar */
  .score-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .score-bar { width: 72px; height: 7px; background: #e9ecef; border-radius: 4px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; }
  .score-num { font-size: 12px; font-weight: 700; color: var(--muted); }

  /* Badges */
  .badges { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
  .badge { padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
  .badge-green  { background: var(--green); }
  .badge-yellow { background: var(--yellow); }
  .badge-red    { background: var(--red); }
  .badge-gray   { background: #adb5bd; }
  .badge-blue   { background: var(--brand); }

  /* Match reason */
  .match { margin-top: 10px; font-size: 13px; color: var(--muted); font-style: italic; }

  /* Skill pills */
  .skills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .skill-pill { background: #e8f0fe; color: var(--brand); padding: 2px 8px;
                 border-radius: 3px; font-size: 11px; }

  /* Action row */
  .actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  .btn-apply { background: var(--brand); color: #fff; padding: 7px 18px; border-radius: 6px;
                text-decoration: none; font-size: 13px; font-weight: 600; transition: background .15s;
                border: none; cursor: pointer; }
  .btn-apply:hover { background: #1e4080; }
  .btn-action { padding: 6px 14px; border: 1px solid var(--border); background: #fff;
                 border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s; }
  .btn-action:hover { border-color: var(--brand); color: var(--brand); }
  .btn-action.active-applied { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-action.active-saved   { background: var(--yellow); color: #fff; border-color: var(--yellow); }
  .btn-action.active-skipped { background: #adb5bd; color: #fff; border-color: #adb5bd; }

  .url-preview { font-size: 11px; color: var(--muted); flex: 1; overflow: hidden;
                  text-overflow: ellipsis; white-space: nowrap; }
  .resume-link { font-size: 12px; color: var(--green); text-decoration: none; }

  /* Connections list */
  .connections { margin-top: 8px; font-size: 12px; color: var(--muted); }
  .conn-item { display: inline-block; background: #f0f4ff; color: var(--brand);
                border-radius: 4px; padding: 2px 7px; margin: 2px; }

  /* Status toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--brand-dark);
            color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px;
            opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }

  footer { text-align: center; color: var(--muted); font-size: 12px;
            padding: 30px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🎯 Job Hunter Dashboard</h1>
    <div class="meta">Ahrar Karim · MS Business Analytics · Boston University · Last run: April 10, 2026 · 04:51 AM UTC</div>
  </div>
  <div class="stat-pills" id="stat-pills"></div>
</header>

<!-- Apply Session Banner (hidden until session starts) -->
<div id="session-banner">
  <div class="session-inner">
    <div class="session-info">

      <div class="session-detail" id="session-detail"></div>

      <button class="btn-session btn-session-next" id="btn-session-applied" onclick="sessionMarkApplied()">Applied ✓</button>

      <button class="btn-session btn-session-end" onclick="endSession()">End Session</button>
    </div>
  </div>
</div>

<div class="filters">
  <input type="text" id="search" placeholder="Search title, company, skill..." oninput="applyFilters()">
  <select id="sort" onchange="applyFilters()">

    <option value="connection">Sort: Connections First</option>
    <option value="cpt">Sort: CPT Friendly First</option>
  </select>
  <button class="filter-btn active" data-filter="all"     onclick="setFilter(this)">All</button>
  <button class="filter-btn"       data-filter="connected" onclick="setFilter(this)">🔗 Connections</button>
  <button class="filter-btn"       data-filter="cpt"       onclick="setFilter(this)">✓ CPT</button>
  <button class="filter-btn"       data-filter="new"       onclick="setFilter(this)">New Only</button>
  <button class="btn-start-session" id="btn-start-session" onclick="startSession()">🚀 Start Apply Session</button>
</div>

<div class="grid" id="grid"></div>
<div id="toast"></div>
<footer>Automated daily · Powered by Job Hunter Bot · <a href="https://github.com/ahrar11/job-hunter" style="color:var(--brand)">View repo</a></footer>

ing.\n\nThe Data and Evaluation Intern will work closely with the Vice President of Family Programming and collaborate with staff across the Family Programming team to ensure data is not only accurate, but meaningful and actionable. Interns will gain hands-on experience in program evaluation, learning how data informs decision-making, strengthens program quality, and drives organizational strategy.\n\nIn addition to core responsibilities, the intern will have the opportunity to design and implement a self-directed project aligned with their interests. This could include building new tracking tools, improving data systems, conducting deeper analysis on program outcomes, or contributing to evaluation frameworks.\n\nCandidates are expected to participate in this internship at least 20 hours per week for at least 13 weeks. Candidates who can volunteer additional time are preferable. You will receive an incentive of $3000 for your participation in the internship program. This incentive is intended to support costs you may incur during your internship at Generation Hope, such as childcare. Internships begin May 2026 to August 2026, with some flexibility on starting and ending dates. This intern will be in-person at the Generation Hope office on Mondays, and the internship will be otherwise remote. Interns who have some availability on evenings and weekends to support events are preferred. Interns must be located in the Washington, DC metro area during the time of the internship.\n\nResponsibilities:\n\u2022 Support database management, ensuring systems are accurate, organized, and user-friendly\n\u2022 Conduct data cleaning to improve data quality and reliability across programs\n\u2022 Design and maintain Excel-based tracking tools that support program monitoring and decision-making\n\u2022 Conduct monthly quality improvement reviews of case notes for all Scholars and synthesize findings into actionable reports\n\u2022 Review Next Generation Academy screenings and home v 22 Experience with or interest in epidemiological and public health data, including genomic, geospatial, and line\u2011list data\n\n\u2022 Familiarity with industry best practices for software/hardware optimization when processing large data sets and experience in the following required task areas: experience with machine learning, statistical modeling, time\u2011series forecasting, and/or geospatial analytics\n\nOverview\n\nNoblis and our wholly owned subsidiaries, Noblis ESI and Noblis MSD, take on some of the nation\u2019s toughest challenges, delivering advanced solutions to our customers\u2019 most critical missions. We bring together leading scientific, engineering, and management expertise in a culture grounded in objectivity and collaboration, ensuring our work creates lasting impact across federal missions.\n\nWe work with a broad range of government agencies in the defense, intelligence, and federal civilian sectors. Learn more and find opportunities at careers.noblis.org\n\nWhy Work at Noblis\n\nAt Noblis, we share a passion for excellence and innovation, and we create an environment where people can do meaningful work while maintaining the balance that keeps them energized and fulfilled. We seek out individuals with a natural curiosity and desire to collaborate and learn. We believe our people are our greatest strength, and we consistently seek exceptionally skilled, mission\u2011driven professionals who care deeply about doing work that enriches lives and makes our nation safer.\n\nNoblis has earned numerous workplace awards for our culture, our commitment to employee well\u2011being, and our dedication to meaningful, impactful work. We also maintain a drug\u2011free workplace.\n\nRemote/hybrid status is subject to change based on Noblis and/or government requirements.\n\nCommitment to Non-Discrimination\n\nAll qualified applicants will receive consideration for employment without regard to race, color, ethnicity, sex, age, national origin, religion, physical or mental disability, pregnancy/childbirth and related medical conditions, veteran or military status, or any other characteristics protected by applicable federal, state, or local law.\n\nIf reasonable accommodation is needed to participate in the job application or interview process, to perform essential job functions, and/or to receive other benefits and privileges of employment, please contact us.\n\nEEO is the Law | E-Verify | Right to Work\n\nTotal Rewards\n\nAt Noblis we recognize and reward your contributions, provide you with growth opportunities, and support your total well\u2011being. Our offerings include health, life, disab", "apply_url": "https://www.jobleads.com/us/job/summer-2026-health-data-ai-ml-intern--annapolis--eaec5b700b671210ea57eaf71247a2541", "apply_url_quality": "direct", "posted_at": "2026-04-04T00:00:00.000Z", "source": "jsearch", "fetched_at": "2026-04-10T04:51:21.066850+00:00", "status": "new", "connection_flag": "none", "relevance_score": 80, "cpt_signal": "positive", "cpt_positive_hits": ["opt"], "cpt_negative_hits": [], "summer_2026_mentioned": true, "raw_score": 80, "match_reason": "AI/ML technical internship at mission-driven research org with focus on data fusion and coding; strong skill alignment with candidate's AI/ML background.", "skill_matches": ["AI/ML", "Python", "data fusion", "NumPy", "Pandas", "Scikit-learn"], "concern": "Government/nonprofit research environment may have clearance or citizenship restrictions not explicitly stated; technical vs. business analytics focus.", "connections": []}, {"id": "dd141aba4730", "title": "Data Science Intern- Summer 2026 - Morristown, NJ or Remote", "company": "Crum and Forster", "location": "Morris Twp, New Jersey", "description": "Crum & Forster Company Overview\nCrum & Forster (C&F) , with a proud history dating to 1822, provides specialty and standard commercial lines insurance products through our admitted and surplus lines insurance companies. C&F enjoys a financial strength rating of \"A+\" (Superior) by AM Best and is proud of our superior customer service platform. Our claims and risk engineering services are recognized as among the best in the industry.\n\nOur most valuable asset is our people: more than 2000 employees in locations throughout the United States. The company is increasingly winning recognition as a great place to work, earning several workplace and wellness awards, including the 2024 Great Place to Work\u00ae Award for our employee-first focus and our steadfast commitment to diversity, equity and Inclusion.\n\nC&F is part of Fairfax Financial Holdings, a global, billion dollar organization.\n\nFor more information about Crum & Forster, please visit our website: ***.\n\nThe Commercial Lines + Executive Risk Division is looking for interns to join us for the summer and work on a handful of projects related to pricing sophistication and book monitoring. The actuarial and data science teams work very closely together and each will have an internship spot available to focus in their respective disciplines. This position will provide valuable experience on the nuances of insurance pricing varying from large accounts (often individually priced based on their own data) to medium sized businesses (priced leveraging predictive modeling to score account attributes).\n\nThis role has a wide breadth of lines of business that can be involved from Commercial Lines (Auto, General Liability, Property, Umbrella and Workers' Compensation) to Executive Risk (Cyber, Professional Liability, Management Liability).\n\nWhat you will do:\n\nWork on 2-3 projects related to account pricing and/or book performance monitoring.\n\nPartner with tenured actuaries and data scientists and learn about the sophistication of pricing insurance.\n\nDevelop, maintain, review, update, and enhance pricing tools\n\nWhat you will bring to C&F:\n\nRelevant coursework/exams in actuarial science or data science a plus.\n\nData Science: R or Python coding experience (stats and web development packages an added plus)\n\nActuarial: Excel or R experience required\n\nStrong communication skills, both verbal and in writing\n\nAn ability to manage time and work effectively independently\n\nWhat C&F will bring to you\n\nA core C&F tenet is owning your career development, so we provide a wealth of ways for you to keep learning, including tuition reimbursement, industry-related certifications and professional training to keep you progressing on your chosen path\n\nA dynamic, ambitious, fun and exciting work environment\n\nWe believe you do well by doing good and want to encourage a spirit of social and community responsibility, matching donation program, volunteer opportunities, and an employee-driven corporate giving program that lets you participate and support your community\n\nAt C&F you will BELONG\n\nIf you require special accommodations, please let us know. We are committed to equal employment opportunity and welcome everyone regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability, gender identity, or Veteran status. If you require special accommodations, please let us know. Belonging at C&F, is a mindset. It's about fostering a culture of inclusion and connection, where everyone feels valued, heard, and empowered to thrive and where our social impact efforts help strengthen the communities where we live and work.\n\nFor California Residents Only: Information collected and processed as part of your career profile and any job applications you choose to submit are subject to our privacy notices and policies, visit ***/onlineprivacypolicy/ca/noticeatcollection/ for more information.\n\nCrum & Forster is committed to ensuring a workplace free from discriminator", "apply_url": "https://www.jobilize.com/job/us-nj-convent-station-data-science-intern-summer-2026-morristown-remote", "apply_url_quality": "direct", "posted_at": "2026-04-09T00:00:00.000Z", "so nology. This position will be in the IT Corporate Products team and support corporate technology functions such as Finance, Physical Security, Flights Operations, and Compliance. Note: The opportunity is on-site and will work in-person four days/week. As such, you must be local to the Cleveland/Akron/Canton (Ohio) area\nIn this position, you will have the opportunity to:\nLearn the business processes that you and your team are supporting. Learn the technology that supports the business processes. Work with your team gathering requirements for technology changes or implementations. Learn the business requirements so that you can develop or modify functional specifications. Complete unit, integration and regression testing for application projects or upgrades, ensuring that correct business functionality is being delivered. Use query tools such as TOAD, Power BI, and QlikView. Collaborate directly with the FirstEnergy business units, as well as other departments of IT, to complete and/or manage your assignments. Deliver effective client support through the investigation and resolution of client issues. Learn how to adhere to FirstEnergy Sarbanes Oxley (SOX) Controls.\nApplicant Requirements\nCurrently enrolled in a bachelor's degree program at an accredited university/college with a major in Management Information Systems, Information Systems Management, Business degree with a minor in a technology program, or an equivalent degree. Class Standing - Junior (graduation date of December 2026 / May 2027) or Sophomore (graduation date of December 2027 / May 2028). Graduation date MUST be listed on resume Maintain a minimum cumulative GPA of\n2.5. (GPA date MUST be listed on resume) Legally authorized to work in the U.S (without current or future sponsorship) Must be local to the Cleveland/Akron/Canton (Ohio) area Experience in Finance, Database management (oracle, sql) Experience in Microsoft office tools ( MS word, excel, outlook ) Excellent written and verbal communicati // ── Feedback persistence (localStorage for instant UX) ───────
function getStatus(id) {
  return localStorage.getItem('job_status_' + id) || 'new';
}
function setStatus(id, status) {
  localStorage.setItem('job_status_' + id, status);
}

// ── Score color ───────────────────────────────────────────────
function scoreColor(s) {
  return s >= 75 ? '#27ae60' : s >= 55 ? '#f39c12' : '#e74c3c';
}

// ── Resume URL builder ────────────────────────────────────────
function getResumeUrl(job) {
  const repoName = window.GITHUB_REPO || '';
  if (job.resume_path && repoName) {
    return 'https://raw.githubusercontent.com/' + repoName + '/main/' + job.resume_path;
  }
  return null;
}

// ── Trigger resume download ───────────────────────────────────
function downloadResume(job) {
  const url = getResumeUrl(job);
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.download = '';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Open job + download resume (single action) ───────────────
function openAndApply(jobId) {
  const job = ALL_JOBS.find(j => j.id === jobId);
  if (!job) return;
  // Open the apply page — Simplify will auto-fill
  if (job.apply_url) window.open(job.apply_url, '_blank');
  // Auto-download the tailored resume
  downloadResume(job);
  showToast('Opened application — Simplify will auto-fill. Resume downloading...');
}

// ══════════════════════════════════════════════════════════════
// APPLY SESSION — step through jobs one by one
// ══════════════════════════════════════════════════════════════
let session = { active: false, queue: [], current: 0, applied: 0, skipped: 0 };

function startSession() {
  // Build queue from currently visible "new" jobs
  const newJobs = ALL_JOBS.filter(j => getStatus(j.id) === 'new');
  if (newJobs.length === 0) {
    showToast('No new jobs to apply to!');
    return;
  }

  session = { active: true, queue: newJobs, current: 0, applied: 0, skipped: 0 };

  // Show banner
  document.getElementById('session-banner').classList.add('active');
  document.getElementById('btn-start-session').style.display = 'none';

  // Start first job
  loadSessionJob();
}

function loadSessionJob() {
  if (session.current >= session.queue.length) {
    endSession();
    return;
  }

  const job = session.queue[session.current];
  const total = session.queue.length;
  const done = session.applied + session.skipped;

  // Update banner
  document.getElementById('session-title').textContent =
    'Applying: ' + job.company + ' — ' + job.title;
  document.getElementById('session-detail').textContent =
    'Job ' + (session.current + 1) + ' of ' + total +
    ' · ' + session.applied + ' applied · ' + session.skipped + ' skipped';

  // Progress bar
  const pct = Math.round((done / total) * 100);
  document.getElementById('session-progress-fill').style.width = pct + '%';
  document.getElementById('session-progress-text').textContent = pct + '% complete';

  // Highlight current card and scroll to it
  document.querySelectorAll('.card').forEach(c => c.classList.remove('session-active'));
  const card = document.getElementById('card-' + job.id);
  if (card) {
    card.classList.add('session-active');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Open apply page + download resume
  openAndApply(job.id);
}

function sessionMarkApplied() {
  if (!session.active) return;
  const job = session.queue[session.current];
  markJob(job.id, 'applied');
  session.applied++;

  const card = document.getElementById('card-' + job.id);
  if (card) { card.classList.remove('session-active'); card.classList.add('session-done'); }

  session.current++;
  loadSessionJob();
}

function sessionMarkSkipped() {
  if (!session.active) return;
  const job = session.queue[session.current];
  markJob(job.id, 'skipped');
  session.skipped++;

  const card = document.getElementById('card-' + job.id);
  if (card) { card.classList.remove('session-active'); card.classList.add('session-done'); }

  session.current++;
  loadSessionJob();
}

function endSession() {
  session.active = false;
  document.getElementById('session-banner').classList.remove('active');
  document.getElementById('btn-start-session').style.display = '';

  // Clean up card highlights
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('session-active', 'session-done');
  });

  if (session.applied + session.skipped > 0) {
    showToast('Session complete! ' + session.applied + ' applied, ' + session.skipped + ' skipped.');
  }
  applyFilters();
}

// ── Render one card ───────────────────────────────────────────
function renderCard(job, rank) {
  const status = getStatus(job.id);
  const connClass = job.connection_flag === '1st_degree' ? 'connected-1'
                  : job.connection_flag === 'possible_2nd' ? 'connected-2' : '';
  const score = job.relevance_score || 0;
  const col   = scoreColor(score);

  const cptBadge = job.cpt_signal === 'positive'
    ? '<span class="badge badge-green">✓ CPT Friendly</span>'
    : job.cpt_signal === 'negative'
    ? '<span class="badge badge-red">✗ No Sponsorship</span>'
    : '<span class="badge badge-yellow">? CPT Unconfirmed</span>';

  const connBadge = job.connection_flag === '1st_degree'
    ? '<span class="badge badge-green">🔗 1st Degree</span>'
    : job.connection_flag === 'possible_2nd'
    ? '<span class="badge badge-yellow">🔗 Possible Connection</span>'
    : '<span class="badge badge-gray">No Connection</span>';

  const urlBadge = job.apply_url_quality === 'aggregator'
    ? '<span class="badge badge-yellow">↗ Redirect</span>' : '';

  const sourceMap = { greenhouse_api: 'Greenhouse', lever_api: 'Lever', jsearch: 'JSearch', adzuna: 'Adzuna' };
  const sourceLabel = sourceMap[job.source] || job.source;

  const skillsHtml = (job.skill_matches || []).slice(0, 6).map(s =>
    '<span class="skill-pill">' + s + '</span>').join('');

  const connectionsHtml = (job.connections || []).length > 0
    ? '<div class="connections">Connections: ' +
        (job.connections || []).slice(0, 4).map(c =>
          '<span class="conn-item">👤 ' + c.name + (c.position ? ' · ' + c.position : '') + '</span>'
        ).join('') +
      '</div>' : '';

  const resumeUrl = getResumeUrl(job);
  const resumeHtml = resumeUrl
    ? '<a href="' + resumeUrl + '" target="_blank" download class="resume-link">📄 Download Resume</a>'
    : job.resume_path ? '<span class="resume-link">📄 Resume ready</span>' : '';

  const url = job.apply_url || '#';
  const urlPreview = url.length > 55 ? url.slice(0, 55) + '...' : url;

  return '<div class="card ' + connClass + ' status-' + status + '"' +
       ' id="card-' + job.id + '"' +
       ' data-score="' + score + '"' +
       ' data-connection="' + job.connection_flag + '"' +
       ' data-cpt="' + job.cpt_signal + '"' +
       ' data-status="' + status + '">' +

    '<div class="card-top">' +
      '<div style="flex:1">' +
        '<div>' +
          '<span class="card-rank">#' + rank + '</span>' +
          '<span class="card-title">' + job.title + '</span>' +
        '</div>' +
        '<div class="card-company">' +
          '<strong>' + job.company + '</strong>' +
          ' · ' + (job.location || 'Remote / TBD') +
          ' · <span style="font-size:11px;color:#9aaac8">via ' + sourceLabel + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="score-wrap">' +
        '<div class="score-bar"><div class="score-fill" style="width:' + score + '%;background:' + col + '"></div></div>' +
        '<span class="score-num">' + score + '</span>' +
      '</div>' +
    '</div>' +

    '<div class="badges">' + cptBadge + connBadge + urlBadge + '</div>' +

    (job.match_reason ? '<div class="match">"' + job.match_reason + '"</div>' : '') +
    (skillsHtml ? '<div class="skills">' + skillsHtml + '</div>' : '') +
    connectionsHtml +
    (job.concern ? '<div style="margin-top:6px;font-size:12px;color:#adb5bd">⚠ ' + job.concern + '</div>' : '') +

    '<div class="actions">' +
      '<button class="btn-apply" onclick="openAndApply(\'' + job.id + '\')">Apply Now →</button>' +
      resumeHtml +
      '<button class="btn-action ' + (status==='applied'?'active-applied':'') + '"' +
              ' onclick="markJob(\'' + job.id + '\',\'applied\')">' +
              '✓ Applied</button>' +
      '<button class="btn-action ' + (status==='saved'?'active-saved':'') + '"' +
              ' onclick="markJob(\'' + job.id + '\',\'saved\')">' +
              '⭐ Save</button>' +
      '<button class="btn-action ' + (status==='skipped'?'active-skipped':'') + '"' +
              ' onclick="markJob(\'' + job.id + '\',\'skipped\')">' +
              '✕ Skip</button>' +
      '<span class="url-preview">' + urlPreview + '</span>' +
    '</div>' +
  '</div>';
}

// ── Render all cards ──────────────────────────────────────────
function renderAll(jobs) {
  const grid = document.getElementById('grid');
  if (!jobs.length) {
    grid.innerHTML = '<div class="empty">No jobs match the current filters.</div>';
    return;
  }
  grid.innerHTML = jobs.map((j, i) => renderCard(j, i + 1)).join('');
  updateStats(jobs);
}

// ── Stats pills ───────────────────────────────────────────────
function updateStats(jobs) {
  const total     = jobs.length;
  const connected = jobs.filter(j => j.connection_flag !== 'none').length;
  const cptPos    = jobs.filter(j => j.cpt_signal === 'positive').length;
  const applied   = jobs.filter(j => getStatus(j.id) === 'applied').length;
  const newCount  = jobs.filter(j => getStatus(j.id) === 'new').length;

  document.getElementById('stat-pills').innerHTML =
    '<div class="pill"><div class="num">' + total + '</div><div class="lbl">Roles</div></div>' +
    '<div class="pill"><div class="num">' + connected + '</div><div class="lbl">Connections</div></div>' +
    '<div class="pill"><div class="num">' + cptPos + '</div><div class="lbl">CPT ✓</div></div>' +
    '<div class="pill"><div class="num">' + applied + '</div><div class="lbl">Applied</div></div>';

  // Update start session button with count
  const btn = document.getElementById('btn-start-session');
  if (btn) btn.textContent = '🚀 Start Apply Session (' + newCount + ' new)';
}

// ── Filter & sort ─────────────────────────────────────────────
let activeFilter = 'all';
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
}

function applyFilters() {
  const q      = document.getElementById('search').value.toLowerCase();
  const sort   = document.getElementById('sort').value;

  let jobs = [...ALL_JOBS];

  if (activeFilter === 'connected') jobs = jobs.filter(j => j.connection_flag !== 'none');
  if (activeFilter === 'cpt')       jobs = jobs.filter(j => j.cpt_signal === 'positive');
  if (activeFilter === 'new')       jobs = jobs.filter(j => getStatus(j.id) === 'new');

  if (q) {
    jobs = jobs.filter(j => {
      const haystack = [j.title, j.company, j.location, ...(j.skill_matches || [])].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }

  if (sort === 'score') {
    jobs.sort((a, b) => (b.relevance_score || 0) - (a.relevance_score || 0));
  } else if (sort === 'connection') {
    const deg = { '1st_degree': 0, 'possible_2nd': 1, 'none': 2 };
    jobs.sort((a, b) => (deg[a.connection_flag] || 2) - (deg[b.connection_flag] || 2)
                      || (b.relevance_score || 0) - (a.relevance_score || 0));
  } else if (sort === 'cpt') {
    const cptOrder = { positive: 0, neutral: 1, negative: 2 };
    jobs.sort((a, b) => (cptOrder[a.cpt_signal] || 1) - (cptOrder[b.cpt_signal] || 1)
                      || (b.relevance_score || 0) - (a.relevance_score || 0));
  }

  renderAll(jobs);
}

// ── GitHub feedback sync ──────────────────────────────────────
async function syncFeedbackToGitHub(jobId, status) {
  const repo = window.GITHUB_REPO;
  const token = window.GITHUB_TOKEN;
  if (!repo || !token) return;

  const apiBase = 'https://api.github.com/repos/' + repo;
  const filePath = 'data/feedback_history.json';
  const url = apiBase + '/contents/' + filePath;

  try {
    const getResp = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });

    let existing = [];
    let sha = null;

    if (getResp.ok) {
      const fileData = await getResp.json();
      sha = fileData.sha;
      const decoded = atob(fileData.content.replace(/\n/g, ''));
      existing = JSON.parse(decoded);
    }

    const job = ALL_JOBS.find(j => j.id === jobId) || {};

    existing = existing.filter(e => e.job_id !== jobId);
    existing.push({
      job_id:    jobId,
      title:     job.title || '',
      company:   job.company || '',
      source:    job.source || '',
      status:    status,
      score:     job.relevance_score || null,
      logged_at: new Date().toISOString()
    });

    const body = {
      message: 'feedback: ' + status + ' ' + (job.company || '') + ' - ' + (job.title || ''),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existing, null, 2)))),
      sha: sha
    };

    const putResp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (putResp.ok) {
      console.log('Feedback synced to GitHub:', jobId, status);
    } else {
      console.warn('GitHub sync failed:', await putResp.text());
    }
  } catch (err) {
    console.warn('GitHub sync error:', err);
  }
}

// ── Mark job status ───────────────────────────────────────────
function markJob(id, status) {
  setStatus(id, status);

  const card = document.getElementById('card-' + id);
  if (card) {
    card.dataset.status = status;
    card.querySelectorAll('.btn-action').forEach(b => {
      b.classList.remove('active-applied', 'active-saved', 'active-skipped');
    });
    const btnMap = { applied: 0, saved: 1, skipped: 2 };
    const idx = btnMap[status];
    const btns = card.querySelectorAll('.btn-action');
    if (btns[idx]) btns[idx].classList.add('active-' + status);
    if (status === 'applied') card.classList.add('status-applied');
    else card.classList.remove('status-applied');
    if (status === 'skipped') card.style.display = 'none';
  }

  if (!session.active) {
    showToast(status === 'applied' ? '✓ Marked as Applied!'
             : status === 'saved'   ? '⭐ Saved!'
             : '✕ Skipped');
  }
  updateStats(ALL_JOBS);
  syncFeedbackToGitHub(id, status);
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────
applyFilters();
